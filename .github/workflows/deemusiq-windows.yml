name: Build DeeMusiq (Windows)

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.35.2"
  FLUTTER_CHANNEL: "master"

defaults:
  run:
    working-directory: deemusiq-app

jobs:
  check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2.18.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
          git-source: https://github.com/flutter/flutter.git

      - name: Install dependencies
        run: flutter pub get

      - name: Create .env
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_API_SECRET: ${{ secrets.LASTFM_API_SECRET }}
        run: |
          cat > .env <<EOF
          LASTFM_API_KEY=${LASTFM_API_KEY}
          LASTFM_API_SECRET=${LASTFM_API_SECRET}
          ENABLE_UPDATE_CHECK=1
          RELEASE_CHANNEL=stable
          HIDE_DONATIONS=1
          EOF

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test

  windows:
    needs: check
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2.18.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
          git-source: https://github.com/flutter/flutter.git

      - name: Enable Windows desktop support
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Create .env
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_API_SECRET: ${{ secrets.LASTFM_API_SECRET }}
        run: |
          @echo off
          (
          echo LASTFM_API_KEY=%LASTFM_API_KEY%
          echo LASTFM_API_SECRET=%LASTFM_API_SECRET%
          echo ENABLE_UPDATE_CHECK=1
          echo RELEASE_CHANNEL=stable
          echo HIDE_DONATIONS=1
          ) > .env

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows release
        env:
          DEEMUSIQ_BACKEND_URL: ${{ vars.DEEMUSIQ_BACKEND_URL }}
          DEEMUSIQ_CHANNEL_KEY: ${{ secrets.DEEMUSIQ_CHANNEL_KEY }}
        run: flutter build windows --release --dart-define=DEEMUSIQ_BACKEND_URL="$env:DEEMUSIQ_BACKEND_URL" --dart-define=DEEMUSIQ_CHANNEL_KEY="$env:DEEMUSIQ_CHANNEL_KEY"

      - name: Package Windows release
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Compress-Archive -Path "build/windows/x64/runner/Release/*" -DestinationPath "dist/DeeMusiq-windows-x86_64.zip"
          # Also create a self-extracting installer directory
          Copy-Item -Recurse "build/windows/x64/runner/Release" "dist/DeeMusiq-windows-x86_64"
          ls dist

      - uses: actions/upload-artifact@v4
        with:
          name: DeeMusiq-windows
          path: deemusiq-app/dist/DeeMusiq-windows-x86_64.zip
          if-no-files-found: error

      - name: Attach to GitHub Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: deemusiq-app/dist/DeeMusiq-windows-x86_64.zip
          name: DeeMusiq ${{ github.ref_name }}
          body: |
            DeeMusiq — *It's a drop day.*

            **Windows:** download and extract `DeeMusiq-windows-x86_64.zip`, run `DeeMusiq.exe`.
