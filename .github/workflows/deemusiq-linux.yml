name: Build DeeMusiq (Linux)

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.35.2"
  FLUTTER_CHANNEL: "master"

defaults:
  run:
    working-directory: deemusiq-app

jobs:
  check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2.18.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
          git-source: https://github.com/flutter/flutter.git

      - name: Install dependencies
        run: flutter pub get

      - name: Create .env
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_API_SECRET: ${{ secrets.LASTFM_API_SECRET }}
        run: |
          cat > .env <<EOF
          LASTFM_API_KEY=${LASTFM_API_KEY}
          LASTFM_API_SECRET=${LASTFM_API_SECRET}
          ENABLE_UPDATE_CHECK=1
          RELEASE_CHANNEL=stable
          HIDE_DONATIONS=1
          EOF

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test

  linux:
    needs: check
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2.18.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
          git-source: https://github.com/flutter/flutter.git

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libmpv-dev mpv \
            libappindicator3-dev libnotify-dev

      - name: Enable Linux desktop support
        run: flutter config --enable-linux-desktop

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Create .env
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_API_SECRET: ${{ secrets.LASTFM_API_SECRET }}
        run: |
          cat > .env <<EOF
          LASTFM_API_KEY=${LASTFM_API_KEY}
          LASTFM_API_SECRET=${LASTFM_API_SECRET}
          ENABLE_UPDATE_CHECK=1
          RELEASE_CHANNEL=stable
          HIDE_DONATIONS=1
          EOF

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Linux release
        env:
          DEEMUSIQ_BACKEND_URL: ${{ vars.DEEMUSIQ_BACKEND_URL }}
          DEEMUSIQ_CHANNEL_KEY: ${{ secrets.DEEMUSIQ_CHANNEL_KEY }}
        run: |
          flutter build linux --release \
            --dart-define=DEEMUSIQ_BACKEND_URL="$DEEMUSIQ_BACKEND_URL" \
            --dart-define=DEEMUSIQ_CHANNEL_KEY="$DEEMUSIQ_CHANNEL_KEY"

      - name: Package Linux release (tar.gz + AppImage dir)
        run: |
          mkdir -p dist
          # tar.gz bundle
          cd build/linux/x64/release
          tar -czf ../../../../dist/DeeMusiq-linux-x86_64.tar.gz bundle
          cd ../../../..
          # Copy the bundle directory for AppImage builders
          cp -r build/linux/x64/release/bundle dist/DeeMusiq-linux-x86_64
          ls -la dist

      - uses: actions/upload-artifact@v4
        with:
          name: DeeMusiq-linux
          path: deemusiq-app/dist/DeeMusiq-linux-x86_64.tar.gz
          if-no-files-found: error

      - name: Attach to GitHub Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: deemusiq-app/dist/DeeMusiq-linux-x86_64.tar.gz
          name: DeeMusiq ${{ github.ref_name }}
          body: |
            DeeMusiq — *It's a drop day.*

            **Linux:** extract `DeeMusiq-linux-x86_64.tar.gz` and run `./bundle/deemusiq`.
